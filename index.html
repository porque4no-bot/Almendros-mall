function calcC(c, inp) {
  const cd = getCDef(c);
  const pTR = c.prof + inp.desplante;
  const tr = pTR - cd.alt;
  const seg = (mn, mx) => Math.max(0, Math.min(mx, inp.exc) - mn) * REND.exc;

  const e36 = seg(3, 6);
  const e69 = seg(6, 9);

  const vC  = inp.restante < pTR ? cd.vol : 0;
  const mlF = Math.min(c.profFuste, Math.max(0, pTR - cd.alt - inp.restante));

  let volExc = inp.exc <= tr
    ? inp.exc * REND.exc
    : (tr * REND.exc) + ((Math.min(cd.alt, inp.exc - tr) / cd.alt) * cd.vol);
  const volCon = vA + vC + vF;
  const mE = (tr * REND.exc) + cd.vol;
  const mC = cd.vol + (tr * REND.anillo) + (c.profFuste * REND.fuste);
  const vacP  = clamp(((pTR - inp.restante) / pTR) * 100, 0, 100);
  const excD  = inp.exc >= pTR;
  const allD  = inp.preop && excD && inp.armado && vacP >= 100 && inp.remate;

  const co = CAISSON_COORDS[c.k] || { x:0, y:0, ex:"?", ey:"?" };

    ...c, ...inp, pTR, tr, cd,

    volExc, volCon, mE, mC, vacP, excD, st, gP, ...co
  };
}

function ProgressChart({ dataPoints: pts, actas: actasList }) {
  if (pts.length < 1) return null;
  const maxV = 100, pad = 30, W = 1000, H = 160;
  const points = pts.map((d, i) => ({
    x: pts.length === 1 ? W / 2 : (i / (pts.length - 1)) * (W - pad * 2) + pad,
    y: H - ((d.value / maxV) * (H - pad * 2) + pad),
    label: d.label, value: d.value
  }));
  const pathD = points.length > 1 ? "M " + points.map(p => `${p.x},${p.y}`).join(" L ") : "";
  return (
    <div className="berlin-card rounded-3xl p-6 mb-6">
      <h4 className="text-[10px] font-black text-muted uppercase tracking-[0.2em] mb-4">Curva de Progreso Diario</h4>
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto overflow-visible">
        {[0,25,50,75,100].map(v => {
          const y = H - ((v / maxV) * (H - pad * 2) + pad);
          return (
            <g key={v}>
              <line x1={pad} y1={y} x2={W-pad} y2={y} stroke="rgba(255,255,255,0.05)" strokeWidth="1"/>
              <text x={pad-5} y={y+3} textAnchor="end" fontSize="8" fill="#475569">{v + "%"}</text>
            </g>
          );
        })}
        {pathD && <path d={pathD} fill="none" stroke="#D32237" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>}
        {points.map((p, i) => {
          const isA = actasList.includes(p.label);
          const showLabel = i === 0 || i === points.length - 1 || isA;
          return (
            <g key={i}>
              <circle cx={p.x} cy={p.y} r={isA ? 6 : 3} fill={isA ? "#FBC202" : "#D32237"} stroke="#0D0D0D" strokeWidth="1"/>
              {showLabel && (
                <text x={p.x} y={p.y-10} textAnchor="middle" fontSize="9" fontWeight="900" fill="#fff">{p.value.toFixed(1) + "%"}</text>
              )}
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function ExcBar({ desplante, pTR, currentExc, height = 14 }) {
  const fill = clamp((currentExc / pTR) * 100, 0, 100);
  const p1 = (desplante / pTR) * 100;
  return (
    <div className="relative w-full bg-white/10 rounded-full overflow-hidden border border-white/5" style={{ height: height + "px" }}>
      <div className="absolute top-0 left-0 h-full bg-brand-yellow" style={{ width: fill + "%" }}></div>
      <div className="absolute top-0 left-0 h-full border-r border-brand-red bg-brand-red/20" style={{ width: p1 + "%" }}></div>
    </div>
  );
}

function CaissonDraw({ status, pTR, desplante, campana, exc=0, vacP=0, excD=false, armado=false, preop=false, remate=false, mini=false }) {
  const col = stColor(status);
  const cd = REND.campana[campana.toFixed(1)] || REND.campana["2.0"];
  const TOP = 22, BOT = 148;                        // svg y range for the caisson
  const TOTAL = BOT - TOP;                           // 126px
  const scale = TOTAL / pTR;
  const sw = mini ? 16 : 24;                         // shaft width
  const cx = 50;
  const shaftH = (pTR - cd.alt) * scale;
  const bellStartY = TOP + shaftH;
  const bottomY = TOP + pTR * scale;                 // = BOT
  const excFrontY = TOP + Math.min(exc, pTR) * scale;
  const desY = TOP + (desplante / pTR) * pTR * scale;
  const bellRpx = (campana / 2) * (mini ? 10 : 14);
  const concreteTopY = vacP > 0 ? bottomY - (vacP / 100) * pTR * scale : bottomY;

  const PHASES = [
    { ok: preop,    label:"PRE", color:"#80AF96" },
    { ok: excD,     label:"EXC", color:"#FBC202" },
    { ok: armado,   label:"ACE", color:"#F68000" },
    { ok: vacP>=100,label:"VAC", color:"#80AF96" },
    { ok: remate,   label:"REM", color:"#D32237"  },
  ];

  return (
    <svg viewBox="0 0 100 160" className="w-full h-full drop-shadow-lg">
      {/* soil background */}
      <rect x="0" y={TOP} width="100" height={TOTAL} fill="rgba(160,120,80,0.10)" rx="2"/>

      {/* excavated void */}
      {exc > 0 && (
        <rect
          x={cx - sw/2 + 1} y={TOP}
          width={sw - 2}
          height={Math.min(excFrontY - TOP, bellStartY - TOP)}
          fill="rgba(211,34,55,0.15)"
        />
      )}
      {excD && (
        <path
          d={`M ${cx-sw/2} ${bellStartY} C ${cx-sw/2} ${bellStartY + cd.alt*scale*0.55} ${cx-bellRpx} ${bottomY} ${cx} ${bottomY} C ${cx+bellRpx} ${bottomY} ${cx+sw/2} ${bellStartY + cd.alt*scale*0.55} ${cx+sw/2} ${bellStartY}`}
          fill="rgba(211,34,55,0.18)"
        />
      )}

      {/* concrete fill */}
      {vacP > 0 && (
        <>
          <rect
            x={cx - sw/2 + 2} y={concreteTopY}
            width={sw - 4}
            height={Math.max(0, bellStartY - concreteTopY)}
            fill="rgba(128,175,150,0.45)" rx="1"
          />
          {vacP >= 100 && (
            <path
              d={`M ${cx-sw/2} ${bellStartY} C ${cx-sw/2} ${bellStartY + cd.alt*scale*0.55} ${cx-bellRpx} ${bottomY} ${cx} ${bottomY} C ${cx+bellRpx} ${bottomY} ${cx+sw/2} ${bellStartY + cd.alt*scale*0.55} ${cx+sw/2} ${bellStartY}`}
              fill="rgba(128,175,150,0.45)"
            />
          )}
        </>
      )}

      {/* shaft walls */}
      <rect x={cx - sw/2}     y={TOP} width={2} height={shaftH} fill={col} opacity="0.9"/>
      <rect x={cx + sw/2 - 2} y={TOP} width={2} height={shaftH} fill={col} opacity="0.9"/>

      {/* bell outline */}
      <path
        d={`M ${cx-sw/2} ${bellStartY} C ${cx-sw/2} ${bellStartY + cd.alt*scale*0.55} ${cx-bellRpx} ${bottomY} ${cx} ${bottomY} C ${cx+bellRpx} ${bottomY} ${cx+sw/2} ${bellStartY + cd.alt*scale*0.55} ${cx+sw/2} ${bellStartY}`}
        fill="none" stroke={col} strokeWidth="1.5" opacity="0.85"
      />

      {/* base plate */}
      <line x1={cx-bellRpx} y1={bottomY} x2={cx+bellRpx} y2={bottomY} stroke={col} strokeWidth="2" opacity="0.6"/>

      {/* ground level */}
      <line x1="4" y1={TOP} x2="96" y2={TOP} stroke="#D32237" strokeWidth="1.5" strokeDasharray="3,2"/>
      <text x={cx} y={TOP - 5} textAnchor="middle" fontSize="7" fill="#D32237" fontWeight="900">±0.00</text>

      {/* desplante dashed */}
      <line x1={cx-sw/2-4} y1={desY} x2={cx+sw/2+4} y2={desY} stroke="#FBC202" strokeWidth="1" strokeDasharray="2,2" opacity="0.65"/>

      {/* current excavation front */}
      {exc > 0 && exc < pTR && (
        <line x1={cx-sw/2} y1={excFrontY} x2={cx+sw/2} y2={excFrontY} stroke="#FBC202" strokeWidth="2.5"/>
      )}

      {/* depth label */}
      {!mini && (
        <text x={cx} y={BOT + 10} textAnchor="middle" fontSize="7" fill="#475569" fontWeight="700">
          {exc.toFixed(1)}m / {pTR.toFixed(1)}m
        </text>
      )}

      {/* phase dots (right side) */}
      {!mini && PHASES.map((ph, i) => {
        const dy = TOP + (i / (PHASES.length - 1)) * TOTAL;
        return (
          <g key={i}>
            <circle cx="90" cy={dy} r="5" fill={ph.ok ? ph.color : "rgba(255,255,255,0.08)"} stroke={ph.ok ? ph.color : "rgba(255,255,255,0.18)"} strokeWidth="1"/>
            <text x="90" y={dy + 2.5} textAnchor="middle" fontSize="4.5" fill={ph.ok ? "#0D0D0D" : "#475569"} fontWeight="900">{ph.label}</text>
          </g>
        );
      })}
    </svg>
  );
}

function StatCard({ label, value, color, delta, icon, subtext }) {
  return (
    <div className="berlin-card p-5 rounded-2xl relative overflow-hidden group">
      <div className={`absolute top-0 right-0 w-1 h-full ${color}`}></div>
      <div className="flex justify-between items-start mb-2">
        <span className="text-[9px] font-black text-muted uppercase tracking-widest">{label}</span>
        <span className="text-xl opacity-60 group-hover:opacity-100 transition-opacity">{icon}</span>
      </div>
      <div className="flex items-baseline gap-2">
        <span className="text-2xl font-black text-white">{value}</span>
        {delta !== undefined && delta !== null && (
          <span className={`text-[9px] font-black ${delta >= 0 ? 'text-brand-sage' : 'text-brand-red'}`}>
            {delta > 0 ? '▲' : delta < 0 ? '▼' : '—'} {Math.abs(delta).toFixed(1)}%
          </span>
        )}
      </div>
      {subtext && <p className="text-[8px] font-black text-muted uppercase mt-1 tracking-tighter">{subtext}</p>}
    </div>
  );
}

// ─── App Principal ────────────────────────────────────────────────────────────

function App() {
  const [dailyLog, setDailyLog] = useState({ [getToday()]: Object.fromEntries(CAISSONS.map(c => [c.k, defEntry(c)])) });
  const [actas, setActas] = useState([]);
  const [loadingFirebase, setLoadingFirebase] = useState(true);
  const [selDate, setSelDate]     = useState(getToday());
  const [selK, setSelK]           = useState(null);
  const [viewMode, setViewMode]   = useState("plano");
  const [filter, setFilter]       = useState("all");
  const [selActa, setSelActa]     = useState(null);
  const [showCalendar, setShowCalendar] = useState(false);
  const [isDarkMode, setIsDarkMode] = useState(true);
  const [calendarMonth, setCalendarMonth] = useState(() => {
    const d = new Date(selDate);
    return { year: d.getFullYear(), month: d.getMonth() };
  });

  // Cargar datos de Firestore al montar
  useEffect(() => {
    if (!window.firebaseDb || !window.firebaseGetDoc || !window.firebaseDoc) {
      console.log("Firebase no está inicializado aún");
      setLoadingFirebase(false);
      return;
    }

    const loadFromFirestore = async () => {
      try {
        const docRef = window.firebaseDoc(window.firebaseDb, "proyecto", "almendros-mall");
        const docSnap = await window.firebaseGetDoc(docRef);

        if (docSnap.exists()) {
          const data = docSnap.data();
          if (data.dailyLog) setDailyLog(data.dailyLog);
          if (data.actas) setActas(data.actas);
          console.log("Datos cargados desde Firestore");
        } else {
          console.log("No hay datos en Firestore aún, usando valores por defecto");
        }
      } catch (error) {
        console.error("Error cargando de Firestore:", error);
      } finally {
        setLoadingFirebase(false);
      }
    };

    loadFromFirestore();
  }, []);

  // Guardar datos a Firestore cuando cambien
  useEffect(() => {
    if (loadingFirebase || !window.firebaseDb || !window.firebaseSetDoc || !window.firebaseDoc) return;

    const saveToFirestore = async () => {
      try {
        const docRef = window.firebaseDoc(window.firebaseDb, "proyecto", "almendros-mall");
        await window.firebaseSetDoc(docRef, {
          dailyLog,
          actas,
          lastUpdated: new Date().toISOString()
        }, { merge: true });
        console.log("Datos guardados en Firestore");
      } catch (error) {
        console.error("Error guardando a Firestore:", error);
      }
    };

    saveToFirestore();
  }, [dailyLog, actas, loadingFirebase]);

  const sortedDates = useMemo(() => Object.keys(dailyLog).sort(), [dailyLog]);

  const processed = useMemo(() =>
    CAISSONS.map(c => calcC(c, (dailyLog[selDate] && dailyLog[selDate][c.k]) ? dailyLog[selDate][c.k] : defEntry(c))),
    [dailyLog, selDate]
  );

  const handleUpdate = useCallback((k, field, val) => {
    const v = typeof val === "boolean" ? val : (parseFloat(val) || 0);
    setDailyLog(prev => ({
      ...prev,
      [selDate]: {
        ...(prev[selDate] || {}),
        [k]: { ...((prev[selDate] || {})[k] || defEntry(findC(k))), [field]: v }
      }
    }));
  }, [selDate]);

  const dash = useMemo(() => {
    let tE=0, cE=0, tC=0, cC=0, cCam=0, cCas=0, cRem=0;
    const n = processed.length;
    for (const d of processed) {
      tE += d.mE; cE += d.volExc; tC += d.mC; cC += d.volCon;
      if (d.excD)   cCam++;
      if (d.armado) cCas++;
      if (d.remate) cRem++;
    }
    const pE  = tE > 0 ? (cE / tE) * 100 : 0;
    const pV  = tC > 0 ? (cC / tC) * 100 : 0;
    const pCa = (cCam / n) * 100;
    const pCs = (cCas / n) * 100;
    const pR  = (cRem / n) * 100;
    const pG  = (pE * 0.45) + (pCa * 0.15) + (pCs * 0.15) + (pV * 0.20) + (pR * 0.05);
    return { pG, pE, pCa, pCs, pV, pR, cE, cC, cCam, cCas };
  }, [processed]);

  const prevDash = useMemo(() => {
    const idx = sortedDates.indexOf(selDate);
    if (idx <= 0) return null;
    const prevDate = sortedDates[idx - 1];
    const prevProcessed = CAISSONS.map(c => calcC(c, (dailyLog[prevDate] && dailyLog[prevDate][c.k]) ? dailyLog[prevDate][c.k] : defEntry(c)));
    let tE=0, cE=0, tC=0, cC=0, cCam=0, cCas=0, cRem=0;
    const n = prevProcessed.length;
    for (const d of prevProcessed) {
      tE += d.mE; cE += d.volExc; tC += d.mC; cC += d.volCon;
      if (d.excD)   cCam++;
      if (d.armado) cCas++;
      if (d.remate) cRem++;
    }
    const pE  = tE > 0 ? (cE / tE) * 100 : 0;
    const pV  = tC > 0 ? (cC / tC) * 100 : 0;
    const pCa = (cCam / n) * 100;
    const pCs = (cCas / n) * 100;
    const pR  = (cRem / n) * 100;
    const pG  = (pE * 0.45) + (pCa * 0.15) + (pCs * 0.15) + (pV * 0.20) + (pR * 0.05);
    return { pG, pE, pCa, pCs, pV, pR };
  }, [sortedDates, selDate, dailyLog]);

  const chartData = useMemo(() =>
    sortedDates.map(d => ({ label: d, value: calcGlobal(dailyLog, d) })),
    [dailyLog, sortedDates]
  );

  const actaData = useMemo(() => {
    if (!selActa) return null;
    const sa = [...actas].sort();
    const idx = sa.indexOf(selActa);
    const prevDate = idx > 0 ? sa[idx - 1] : null;
    const totals = {};
    for (const ik of Object.keys(ITEMS)) {
      const ck = ITEMS[ik].billKey;
      totals[ik] = CAISSONS.reduce((acc, c) => {
        const cur = calcC(c, (dailyLog[selActa] && dailyLog[selActa][c.k]) ? dailyLog[selActa][c.k] : defEntry(c));
        const pre = calcC(c, (prevDate && dailyLog[prevDate] && dailyLog[prevDate][c.k]) ? dailyLog[prevDate][c.k] : defEntry(c));
        return acc + (cur.bill[ck] - pre.bill[ck]);
      }, 0);
    }
    return totals;
  }, [selActa, actas, dailyLog]);

  /* Caisson status counters */
  const caissonStatus = useMemo(() => {
    let sinIniciar=0, enProgreso=0, completados=0;
    for (const d of processed) {
      if      (d.st === "completed") completados++;
      else if (d.st === "active")    enProgreso++;
      else                           sinIniciar++;
    }
    return { sinIniciar, enProgreso, completados };
  }, [processed]);

  const selData = selK ? processed.find(d => d.k === selK) : null;

  const fileInputRef = useRef(null);

  const handleExport = useCallback(() => {
    const data = JSON.stringify({ dailyLog, actas }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `BERLIN_EXPORT_${selDate}.json`; a.click();
    URL.revokeObjectURL(url);
  }, [dailyLog, actas, selDate]);

  const handleImport = useCallback((e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.dailyLog) setDailyLog(data.dailyLog);
        if (data.actas)    setActas(data.actas);
        const dates = Object.keys(data.dailyLog || {}).sort();
        if (dates.length) setSelDate(dates[dates.length - 1]);
      } catch(_) { alert('Archivo JSON inválido o corrupto.'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  }, []);

  const handleDeleteCaisson = useCallback((k) => {
    if (!confirm(`¿Eliminar todos los datos del caisson K-${k}?`)) return;
    setDailyLog(prev => {
      const newLog = { ...prev };
      for (const date of Object.keys(newLog)) {
        const newDate = { ...newLog[date] };
        delete newDate[k];
        newLog[date] = newDate;
      }
      return newLog;
    });
    if (selK === k) setSelK(null);
  }, [selK]);

  const crearDia = useCallback(() => {
    const last = sortedDates[sortedDates.length - 1];
    const next = new Date(last + 'T12:00:00');
    next.setDate(next.getDate() + 1);
    const nStr = next.toISOString().split('T')[0];
    if (dailyLog[nStr]) { setSelDate(nStr); return; }
    setDailyLog(prev => ({ ...prev, [nStr]: JSON.parse(JSON.stringify(prev[last])) }));
    setSelDate(nStr);
    setViewMode("plano");
    setSelActa(null);
  }, [sortedDates, dailyLog]);

  const getCalendarDays = useMemo(() => {
    const firstDay = new Date(calendarMonth.year, calendarMonth.month, 1);
    const lastDay = new Date(calendarMonth.year, calendarMonth.month + 1, 0);
    const startDate = new Date(firstDay);
    startDate.setDate(startDate.getDate() - firstDay.getDay());

    const days = [];
    let current = new Date(startDate);
    while (current <= lastDay || days.length % 7 !== 0) {
      days.push(new Date(current));
      current.setDate(current.getDate() + 1);
    }
    return days;
  }, [calendarMonth]);

  const monthName = useMemo(() => {
    const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
    return `${months[calendarMonth.month]} ${calendarMonth.year}`;
  }, [calendarMonth]);

  // Mostrar loader mientras se carga Firebase
  if (loadingFirebase) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-brand-black">
        <div className="text-center">
          <div className="inline-block animate-spin mb-4">
            <div className="w-12 h-12 border-4 border-brand-red/20 border-t-brand-red rounded-full"></div>
          </div>
          <p className="text-white/60 text-sm">Conectando a Firestore...</p>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen pb-16">
      {/* ── HEADER ─────────────────────────────────────────────── */}
      <header className="bg-brand-black border-b border-white/10 px-6 py-4 sticky top-0 z-50 backdrop-blur-md">
        <div className="flex flex-wrap items-center justify-between gap-3">
          <div className="flex items-center gap-4">
            {/* Logo BERLÍN° real SVG */}
            <BerlinLogo height={40} />
            <div className="h-8 w-px bg-white/10 mx-1"></div>
            <div>
              <h1 className="text-lg font-black tracking-widest uppercase leading-none text-white">
                BERLÍN<sup className="text-[10px]">°</sup>
              </h1>
              <p className="text-[9px] font-black mt-0.5 tracking-[0.2em] uppercase" style={{color:"#80AF96"}}>
                Gestión Estructural
              </p>
            </div>
          </div>

          <div className="flex-1 min-w-0 px-4 hidden md:block">
            <p className="text-[10px] font-black uppercase tracking-widest text-white/50 truncate">
              Almendros Mall – Tronio Etapa 3
            </p>
          </div>

          <div className="flex items-center gap-3">
            {/* Calendar + Actas Selector */}
            <div className="relative">
              <button
                onClick={() => setShowCalendar(!showCalendar)}
                className="flex items-center gap-2 px-4 py-2 rounded-xl text-[10px] font-black uppercase text-white transition-all border border-white/20 hover:bg-white/5"
                style={{background:"rgba(255,255,255,0.07)"}}
              >
                📅 {selActa ? `Acta ${actas.indexOf(selActa) + 1}` : selDate.slice(5)}
                <span className={`text-xs transition-transform ${showCalendar ? 'rotate-180' : ''}`}>▼</span>
              </button>

              {showCalendar && (
                <div className="absolute top-12 z-50 bg-brand-black border border-white/20 rounded-2xl p-4 shadow-2xl"
                  style={{left:"8px", width:"calc(100vw - 16px)", background:"rgba(13,13,13,0.98)", backdropFilter:"blur(20px)", maxHeight:"600px", overflowY:"auto"}}>

                  {/* CALENDAR */}
                  <div className="mb-6">
                    <div className="flex items-center justify-between mb-4">
                      <button onClick={() => setCalendarMonth(m => ({ ...m, month: m.month === 0 ? 11 : m.month - 1, year: m.month === 0 ? m.year - 1 : m.year }))} className="p-2 hover:bg-white/10 rounded-lg transition text-white/60 hover:text-white">◀</button>
                      <span className="text-[10px] font-black uppercase tracking-widest text-white">{monthName}</span>
                      <button onClick={() => setCalendarMonth(m => ({ ...m, month: m.month === 11 ? 0 : m.month + 1, year: m.month === 11 ? m.year + 1 : m.year }))} className="p-2 hover:bg-white/10 rounded-lg transition text-white/60 hover:text-white">▶</button>
                    </div>

                    <div className="grid grid-cols-7 gap-1 mb-2">
                      {["Lu", "Ma", "Mi", "Ju", "Vi", "Sa", "Do"].map(d => (
                        <div key={d} className="text-center text-[8px] font-black text-muted uppercase py-1">{d}</div>
                      ))}
                    </div>

                    <div className="grid grid-cols-7 gap-1">
                      {getCalendarDays.map((day, idx) => {
                        const dateStr = day.toISOString().split('T')[0];
                        const isCurrentMonth = day.getMonth() === calendarMonth.month;
                        const isSelected = dateStr === selDate && !selActa;
                        const hasActa = actas.includes(dateStr);
                        const hasLog = sortedDates.includes(dateStr);

                        return (
                          <button
                            key={idx}
                            onClick={() => {
                              if (hasLog || hasActa) {
                                setSelDate(dateStr);
                                setViewMode(hasActa ? "acta" : "plano");
                                if (hasActa) setSelActa(dateStr);
                                else setSelActa(null);
                                setShowCalendar(false);
                              }
                            }}
                            disabled={!hasLog && !hasActa}
                            className={`py-2 rounded text-[9px] font-black transition-all
                              ${isSelected ? 'bg-brand-red text-white' : hasActa ? 'bg-brand-yellow text-black hover:bg-yellow-400' : hasLog ? 'bg-white/5 text-white hover:bg-white/10' : 'text-white/20 cursor-not-allowed'}
                              ${!isCurrentMonth && !hasLog && !hasActa ? 'opacity-30' : ''}
                            `}
                          >
                            {day.getDate()}
                          </button>
                        );
                      })}
                    </div>
                  </div>

                  {/* ACTAS GENERADAS */}
                  {actas.length > 0 && (
                    <div className="border-t border-white/10 pt-4">
                      <p className="text-[9px] font-black uppercase text-muted mb-3 tracking-widest">Actas Generadas</p>
                      <div className="space-y-2 max-h-48 overflow-y-auto sthin">
                        {actas.map((a, idx) => (
                          <button
                            key={a}
                            onClick={() => { setSelActa(a); setViewMode("acta"); setShowCalendar(false); }}
                            className={`w-full px-3 py-2 rounded-lg text-[10px] font-black transition-all text-left
                              ${selActa === a ? 'bg-brand-yellow text-black' : 'bg-white/5 text-muted hover:text-white'}`}
                          >
                            📋 Acta {idx + 1} · {a}
                          </button>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>

            <button
              onClick={crearDia}
              className="bg-brand-red px-4 py-2 rounded-xl text-[10px] font-black uppercase text-white shadow-lg shadow-brand-red/20 transition-transform active:scale-95 hover:bg-red-700"
            >
              + Registro
            </button>

            <button
              onClick={() => {
                if (!actas.includes(selDate)) {
                  setActas(p => [...p, selDate].sort());
                }
                setSelActa(selDate);
                setViewMode("acta");
                setShowCalendar(false);
              }}
              className="bg-brand-yellow px-4 py-2 rounded-xl text-[10px] font-black uppercase text-black transition-transform active:scale-95 hover:bg-yellow-400"
            >
              Cortar Acta
            </button>

            <button
              onClick={() => {
                if (confirm(`¿Eliminar registro del ${selDate}? Esta acción no se puede deshacer.`)) {
                  setDailyLog(prev => {
                    const newLog = { ...prev };
                    delete newLog[selDate];
                    const remaining = Object.keys(newLog).sort();
                    if (remaining.length > 0) {
                      setSelDate(remaining[remaining.length - 1]);
                    }
                    return newLog;
                  });
                  setSelActa(null);
                  setViewMode("plano");
                }
              }}
              className="bg-red-900/50 border border-red-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase text-red-300 transition-transform active:scale-95 hover:bg-red-900"
              title="Eliminar registro"
            >
              🗑️ Eliminar
            </button>

            <button
              onClick={() => {
                setIsDarkMode(!isDarkMode);
                document.body.classList.toggle('light-mode');
              }}
              className="bg-white/10 border border-white/20 px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all active:scale-95 hover:bg-white/20"
              title={isDarkMode ? "Modo Diurno" : "Modo Nocturno"}
            >
              {isDarkMode ? '☀️ Diurno' : '🌙 Nocturno'}
            </button>
          </div>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-6 mt-8">

        {/* ── KPI CARDS ──────────────────────────────────────────── */}
        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-6">
          <StatCard
            label="Avance Global"
            value={dash.pG.toFixed(1) + "%"}
            color="bg-brand-red"
            delta={prevDash ? dash.pG - prevDash.pG : null}
            icon="🏗️"
          />
          <StatCard
            label="Excavación"
            value={dash.pE.toFixed(1) + "%"}
            color="bg-brand-orange"
            delta={prevDash ? dash.pE - prevDash.pE : null}
            icon="⚡"
            subtext={dash.cE.toFixed(0) + " m³"}
          />
          <StatCard
            label="Campanas"
            value={dash.pCa.toFixed(1) + "%"}
            color="bg-brand-yellow"
            delta={prevDash ? dash.pCa - prevDash.pCa : null}
            icon="🛡️"
            subtext={dash.cCam + " / 26"}
          />
          <StatCard
            label="Castillos"
            value={dash.pCs.toFixed(1) + "%"}
            color="bg-white"
            delta={prevDash ? dash.pCs - prevDash.pCs : null}
            icon="⛓️"
            subtext={dash.cCas + " / 26"}
          />
          <StatCard
            label="Vaciado"
            value={dash.pV.toFixed(1) + "%"}
            color="bg-brand-sage"
            delta={prevDash ? dash.pV - prevDash.pV : null}
            icon="💧"
            subtext={dash.cC.toFixed(1) + " m³"}
          />
          <StatCard
            label="Remate"
            value={dash.pR.toFixed(1) + "%"}
            color="bg-purple-500"
            delta={prevDash ? dash.pR - prevDash.pR : null}
            icon="✨"
          />
        </div>

        {/* ── CAISSON STATUS COUNTER ─────────────────────────────── */}
        <div className="grid grid-cols-3 gap-4 mb-8">
          {[
            { label:"Sin Iniciar",  val: caissonStatus.sinIniciar,  color:"bg-slate-500",   dot:"#64748B" },
            { label:"En Progreso",  val: caissonStatus.enProgreso,  color:"bg-brand-yellow", dot:"#FBC202" },
            { label:"Completados",  val: caissonStatus.completados, color:"bg-brand-sage",   dot:"#80AF96" },
          ].map(({ label, val, color, dot }) => (
            <div key={label} className="berlin-card rounded-2xl p-4 flex items-center gap-4">
              <div className="w-10 h-10 rounded-full flex items-center justify-center shrink-0" style={{background: dot + "33", border: `1.5px solid ${dot}`}}>
                <span className="text-lg font-black" style={{color: dot}}>{val}</span>
              </div>
              <div>
                <p className="text-[8px] font-black uppercase tracking-widest text-muted">{label}</p>
                <p className="text-xs font-black text-white">{((val / CAISSONS.length) * 100).toFixed(0)}% del total</p>
              </div>
            </div>
          ))}
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
          <div className="lg:col-span-3 space-y-6">

            {/* PROGRESS CHART */}
            <ProgressChart dataPoints={chartData} actas={actas} />

            {/* PLANO INTERACTIVO */}
            <div className="berlin-card rounded-3xl p-6">
              <div className="flex justify-between items-center mb-6">
                <h3 className="text-[10px] font-black text-muted uppercase tracking-[0.2em]">Geometría de Cimentación</h3>
                <div className="flex gap-4">
                  <div className="flex items-center gap-1.5">
                    <div className="w-2.5 h-2.5 rounded-full bg-brand-sage"></div>
                    <span className="text-[9px] font-black uppercase">Finalizado</span>
                  </div>
                  <div className="flex items-center gap-1.5">
                    <div className="w-2.5 h-2.5 rounded-full bg-brand-yellow"></div>
                    <span className="text-[9px] font-black uppercase">Activo</span>
                  </div>
                </div>
              </div>
              {(() => {
                const GROWS = ['A','B','C','D'];
                const GCOLS = ['1','2','3','4','5','6','7','8'];
                const PL=52, PT=44, CW=102, CH=92;
                const VW = PL + GCOLS.length*CW + 28;
                const VH = PT + GROWS.length*CH + 38;
                const gx = (ex) => PL + GCOLS.indexOf(ex)*CW + CW/2;
                const gy = (ey) => PT + GROWS.indexOf(ey)*CH + CH/2;
                const R = 16, CIRC = 2*Math.PI*R;
                return (
                  <div className="bg-black/40 rounded-2xl p-4 border border-white/5">
                    <svg viewBox={`0 0 ${VW} ${VH}`} className="w-full h-auto" preserveAspectRatio="xMidYMid meet">
                      {/* column labels + vertical guides */}
                      {GCOLS.map((col,ci) => (
                        <g key={col}>
                          <line x1={PL+ci*CW+CW/2} y1={PT-12} x2={PL+ci*CW+CW/2} y2={VH-28}
                            stroke="rgba(255,255,255,0.04)" strokeDasharray="4,5"/>
                          <text x={PL+ci*CW+CW/2} y={PT-18} textAnchor="middle"
                            fontSize="13" fontWeight="900" fill="#475569">{col}</text>
                        </g>
                      ))}
                      {/* row labels + horizontal guides */}
                      {GROWS.map((row,ri) => (
                        <g key={row}>
                          <line x1={PL-10} y1={PT+ri*CH+CH/2} x2={VW-10} y2={PT+ri*CH+CH/2}
                            stroke="rgba(255,255,255,0.04)" strokeDasharray="4,5"/>
                          <text x={PL-18} y={PT+ri*CH+CH/2+5} textAnchor="middle"
                            fontSize="13" fontWeight="900" fill="#475569">{row}</text>
                        </g>
                      ))}
                      {/* caissons */}
                      {processed.map(c => {
                        if (c.ex === '?' || c.ey === '?') return null;
                        const cx = gx(c.ex), cy = gy(c.ey);
                        const col = stColor(c.st);
                        const pct = c.gP;
                        const arc = (pct/100)*CIRC;
                        const isSel = selK === c.k;
                        return (
                          <g key={c.k} className="cursor-pointer" onClick={() => setSelK(c.k)}>
                            {/* cell bg on select */}
                            {isSel && <rect x={cx-CW/2+4} y={cy-CH/2+4} width={CW-8} height={CH-8}
                              rx="10" fill={col} fillOpacity="0.08"/>}
                            {/* campana footprint ring */}
                            <circle cx={cx} cy={cy} r={CW*0.36}
                              fill="none" stroke={col} strokeWidth="1"
                              strokeDasharray="3,4" opacity="0.25"/>
                            {/* progress track */}
                            <circle cx={cx} cy={cy} r={R} fill="none"
                              stroke="rgba(255,255,255,0.07)" strokeWidth="3.5"/>
                            {/* progress arc */}
                            {pct > 0 && (
                              <circle cx={cx} cy={cy} r={R} fill="none"
                                stroke={col} strokeWidth="3.5"
                                strokeDasharray={`${arc} ${CIRC}`}
                                strokeLinecap="round"
                                strokeDashoffset={CIRC/4}
                                opacity="0.9"/>
                            )}
                            {/* center fill */}
                            <circle cx={cx} cy={cy} r={isSel ? 11 : 9}
                              fill={isSel ? col : "rgba(13,13,13,0.95)"}
                              stroke={col} strokeWidth={isSel ? 0 : 1.5}/>
                            {/* K label */}
                            <text x={cx} y={cy+3.5} textAnchor="middle"
                              fontSize="8.5" fontWeight="900"
                              fill={isSel ? "#0D0D0D" : "#FFFFFF"}>{"K"+c.k}</text>
                            {/* diameter between rings */}
                            <text x={cx} y={cy+25} textAnchor="middle"
                              fontSize="8" fill="#475569" opacity="0.85">{"ø"+c.campana+"m"}</text>
                            {/* % label */}
                            <text x={cx} y={cy+CH*0.42} textAnchor="middle"
                              fontSize="9.5" fontWeight="700"
                              fill={col} opacity="0.75">{pct.toFixed(0)+"%"}</text>
                          </g>
                        );
                      })}
                    </svg>
                  </div>
                );
              })()}
            </div>

            {/* ACTAS DE COBRO */}
            {actas.length > 0 && (
              <div className="berlin-card rounded-3xl p-6">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-[10px] font-black text-muted uppercase tracking-[0.2em]">Actas de Cobro</h3>
                  <div className="flex gap-2 flex-wrap">
                    {actas.map(a => (
                      <button
                        key={a}
                        onClick={() => { setSelActa(a); setViewMode("acta"); }}
                        className={`px-3 py-1.5 rounded-lg text-[9px] font-black uppercase transition
                          ${selActa === a ? 'bg-brand-yellow text-black' : 'bg-white/5 text-muted hover:text-white'}`}
                      >
                        {a}
                      </button>
                    ))}
                  </div>
                </div>
                {viewMode === "acta" && selActa && actaData && (
                  <div className="space-y-2">
                    {Object.keys(ITEMS).map(ik => {
                      const val = actaData[ik] || 0;
                      if (val <= 0.0001) return null;
                      return (
                        <div key={ik} className="bg-white/5 border border-white/10 rounded-xl px-4 py-3 flex justify-between items-center gap-4">
                          <div className="flex flex-col min-w-0">
                            <div className="flex items-center gap-2 flex-wrap">
                              <span className="text-[10px] font-black text-brand-red shrink-0">{ITEMS[ik].code}</span>
                              <span className="text-[9px] font-black text-white/40 shrink-0">Ref.{ITEMS[ik].ref}</span>
                            </div>
                            <span className="text-[9px] text-muted truncate">{ITEMS[ik].name}</span>
                          </div>
                          <div className="text-right shrink-0">
                            <span className="text-sm font-black text-white">{val.toFixed(2)}</span>
                            <span className="text-[9px] font-black text-muted ml-1 uppercase">{ITEMS[ik].unit}</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

            {/* TABLA POR UNIDAD */}
            <div className="berlin-card rounded-3xl overflow-hidden">
              <div className="px-6 py-4 border-b border-white/5 flex justify-between items-center bg-white/5">
                <h3 className="text-[10px] font-black text-muted uppercase tracking-widest">Estado por Unidad</h3>
                <div className="flex bg-black rounded-lg p-0.5 border border-white/10 text-[8px] font-black uppercase">
                  {['all','active','completed'].map(f => (
                    <button
                      key={f}
                      onClick={() => setFilter(f)}
                      className={`px-3 py-1.5 rounded-md transition ${filter===f ? 'bg-brand-red text-white' : 'text-muted hover:text-white'}`}
                    >
                      {f}
                    </button>
                  ))}
                </div>
              </div>
              <div className="overflow-x-auto sthin">
                <table className="w-full text-left text-xs">
                  <thead className="bg-white/5 text-muted font-black uppercase tracking-tight border-b border-white/10">
                    <tr>
                      <th className="px-4 py-3">ID</th>
                      <th className="px-2 py-3 text-center">Sección</th>
                      <th className="px-4 py-3">Excavación</th>
                      <th className="px-4 py-3">Vaciado</th>
                      <th className="px-4 py-3 text-center">Fases</th>
                      <th className="px-4 py-3 text-right">Avance</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-white/5">
                    {processed.filter(d => filter==='all' || d.st===filter).map(d => (
                      <tr
                        key={d.k}
                        onClick={() => setSelK(d.k)}
                        onContextMenu={(e) => {
                          e.preventDefault();
                          if (confirm(`¿Eliminar todos los datos de K-${d.k}?`)) {
                            handleDeleteCaisson(d.k);
                          }
                        }}
                        className={`hover:bg-white/5 cursor-pointer transition-colors ${selK===d.k ? 'bg-brand-red/10' : ''}`}
                        title="Click derecho para eliminar"
                      >
                        {/* ID */}
                        <td className="px-4 py-3">
                          <div className="flex items-center gap-2">
                            <div className="w-2 h-2 rounded-full shrink-0" style={{background: stColor(d.st)}}></div>
                            <div>
                              <span className="font-black text-white block">{"K-"+d.k}</span>
                              <span className="text-[8px] text-muted font-bold">{d.ey+"-"+d.ex}</span>
                            </div>
                          </div>
                        </td>

                        {/* Mini caisson geometry */}
                        <td className="px-2 py-1 text-center">
                          <div style={{width:"44px", height:"64px"}} className="mx-auto">
                            <CaissonDraw
                              status={d.st} pTR={d.pTR} desplante={d.desplante} campana={d.campana}
                              exc={d.exc} vacP={d.vacP} excD={d.excD}
                              armado={d.armado} preop={d.preop} remate={d.remate}
                              mini={true}
                            />
                          </div>
                        </td>

                        {/* Excavación */}
                        <td className="px-4 py-3 min-w-[140px]">
                          <ExcBar pTR={d.pTR} desplante={d.desplante} currentExc={d.exc} />
                          <span className="text-[8px] font-black text-muted mt-1 block">
                            {d.exc.toFixed(1)} / {d.pTR.toFixed(1)} m
                          </span>
                        </td>

                        {/* Vaciado */}
                        <td className="px-4 py-3">
                          <div className="w-24 bg-white/10 h-2 rounded-full overflow-hidden">
                            <div className="bg-brand-sage h-full rounded-full" style={{width: d.vacP + "%"}}></div>
                          </div>
                          <span className="text-[8px] font-black text-muted mt-1 block">{d.vacP.toFixed(0)}%</span>
                        </td>

                        {/* Fases — 5 dots: Preop · Exc · Armado · Vaciado · Remate */}
                        <td className="px-4 py-3">
                          <div className="flex items-center gap-1">
                            {[
                              { ok: d.preop,    title:"Preop",   color:"#80AF96" },
                              { ok: d.excD,     title:"Excav.",  color:"#FBC202" },
                              { ok: d.armado,   title:"Acero",   color:"#F68000" },
                              { ok: d.vacP>=100,title:"Vaciado", color:"#80AF96" },
                              { ok: d.remate,   title:"Remate",  color:"#D32237"  },
                            ].map((ph, i) => (
                              <div
                                key={i}
                                title={ph.title}
                                className="w-3 h-3 rounded-full border"
                                style={{
                                  background: ph.ok ? ph.color : "rgba(255,255,255,0.06)",
                                  borderColor: ph.ok ? ph.color : "rgba(255,255,255,0.2)",
                                  boxShadow: ph.ok ? `0 0 4px ${ph.color}88` : "none"
                                }}
                              />
                            ))}
                          </div>
                          <div className="flex gap-1 mt-1">
                            {["P","E","A","V","R"].map((l,i) => (
                              <span key={i} className="text-[6px] font-black text-muted/60 w-3 text-center">{l}</span>
                            ))}
                          </div>
                        </td>

                        {/* Avance */}
                        <td className="px-4 py-3 text-right">
                          <span className="font-black text-brand-red text-sm">{d.gP.toFixed(1)}%</span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

          </div>

          {/* ── PANEL LATERAL ─────────────────────────────────────── */}
          <div className="lg:col-span-1">
            <div className="berlin-card rounded-3xl p-6 sticky top-24 max-h-[88vh] overflow-y-auto sthin">
              {selData ? (
                <div className="space-y-6">
                  <div className="border-b border-white/10 pb-4">
                    <span className="text-[8px] font-black text-brand-red uppercase tracking-widest block mb-1">Unidad Seleccionada</span>
                    <h2 className="text-4xl font-black tracking-tighter text-white">{"K-"+selData.k}</h2>
                    <div className="inline-block mt-2 bg-white/5 px-2 py-1 rounded text-[9px] font-black uppercase text-secondary border border-white/10">
                      {selData.ey+"-"+selData.ex}
                    </div>
                  </div>

                  <div className="bg-black/40 rounded-2xl p-4 border border-white/5 flex justify-center h-48">
                    <CaissonDraw
                      status={selData.st} pTR={selData.pTR} desplante={selData.desplante} campana={selData.campana}
                      exc={selData.exc} vacP={selData.vacP} excD={selData.excD}
                      armado={selData.armado} preop={selData.preop} remate={selData.remate}
                    />
                  </div>

                  <div className="grid grid-cols-2 gap-3">
                    {[
                      { label:"Excavación (m)", field:"exc",          color:"text-brand-yellow" },
                      { label:"Anillos (m)",    field:"anillos",       color:"text-white" },
                      { label:"Restante (m)",   field:"restante",      color:"text-brand-red" },
                      { label:"Suelo Nat. (m)", field:"sueloNatural",  color:"text-brand-sage" },
                    ].map(({ label, field, color }) => (
                      <div key={field} className="bg-white/5 p-3 rounded-xl border border-white/5">
                        <label className="text-[8px] font-black text-muted uppercase block mb-1">{label}</label>
                        <input
                          type="number" step="0.1"
                          value={selData[field]}
                          onChange={e => handleUpdate(selData.k, field, e.target.value)}
                          className={`w-full bg-transparent text-lg font-black outline-none ${color}`}
                        />
                      </div>
                    ))}
                    <div className="col-span-2 bg-white/5 p-3 rounded-xl border border-white/5">
                      <label className="text-[8px] font-black text-brand-red uppercase block mb-1">Desplante (m)</label>
                      <input
                        type="number" step="0.1"
                        value={selData.desplante}
                        onChange={e => handleUpdate(selData.k, "desplante", e.target.value)}
                        className="w-full bg-transparent text-lg font-black text-white outline-none"
                      />
                    </div>
                  </div>

                  <div className="space-y-2">
                    <p className="text-[8px] font-black text-muted uppercase tracking-widest mb-2">Checklist Fases</p>
                    {[
                      { l:"Preoperacionales", ok: selData.preop,   fn: () => handleUpdate(selData.k, "preop",   !selData.preop)   },
                      { l:"Acero / Castillo", ok: selData.armado,  fn: () => handleUpdate(selData.k, "armado",  !selData.armado)  },
                      { l:"Remate Final",     ok: selData.remate,  fn: () => handleUpdate(selData.k, "remate",  !selData.remate)  },
                    ].map((step, i) => (
                      <div
                        key={i}
                        onClick={step.fn}
                        className={`flex items-center gap-3 p-3 rounded-xl border cursor-pointer transition
                          ${step.ok ? 'bg-brand-sage/20 border-brand-sage text-white' : 'bg-white/5 border-white/5 text-muted hover:bg-white/10'}`}
                      >
                        <div className={`w-4 h-4 rounded-full flex items-center justify-center text-[8px] font-black shrink-0
                          ${step.ok ? 'bg-brand-sage text-black' : 'border border-white/30'}`}>
                          {step.ok ? '✓' : ''}
                        </div>
                        <span className="text-[10px] font-black uppercase">{step.l}</span>
                      </div>
                    ))}
                  </div>

                  <div className="pt-4 border-t border-white/10 space-y-2">
                    <div className="flex justify-between text-[9px] font-black uppercase">
                      <span className="text-muted">Vol. Excavado</span>
                      <span className="text-white">{selData.volExc.toFixed(2)} m³</span>
                    </div>
                    <div className="flex justify-between text-[9px] font-black uppercase">
                      <span className="text-muted">Vol. Concreto</span>
                      <span className="text-brand-sage">{selData.volCon.toFixed(2)} m³</span>
                    </div>
                    <div className="flex justify-between text-[9px] font-black uppercase">
                      <span className="text-muted">Prof. Total</span>
                      <span className="text-white">{selData.pTR.toFixed(2)} m</span>
                    </div>
                    <div className="flex justify-between text-[9px] font-black uppercase">
                      <span className="text-muted">Campana ø</span>
                      <span className="text-brand-yellow">{selData.campana} m</span>
                    </div>
                  </div>
                </div>
              ) : (
                <div className="py-20 text-center flex flex-col items-center opacity-30">
                  <div className="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center mb-4 text-2xl">🏗️</div>
                  <p className="text-[9px] font-black uppercase tracking-widest leading-loose">Selecciona unidad<br/>en el plano</p>
                </div>
              )}
            </div>

{/* sidebar export card removed — now in floating toolbar */}
          </div>
        </div>
      </main>

      {/* ── FLOATING TOOLBAR: Exportar / Cargar JSON ─────────── */}
      <input type="file" accept=".json" ref={fileInputRef} onChange={handleImport} className="hidden"/>
      <div className="fixed bottom-6 right-6 z-50 flex flex-col gap-2 items-end">
        <p className="text-[8px] font-black uppercase tracking-[0.25em] text-muted mb-0.5 mr-1">Base de datos</p>
        <button
          onClick={handleExport}
          className="flex items-center gap-2.5 px-4 py-2.5 rounded-2xl text-[10px] font-black uppercase text-white transition-all shadow-2xl group"
          style={{background:"rgba(13,13,13,0.92)", border:"1px solid rgba(255,255,255,0.14)", backdropFilter:"blur(16px)"}}
        >
          <span className="text-base group-hover:scale-110 transition-transform">💾</span>
          Exportar JSON
        </button>
        <button
          onClick={() => fileInputRef.current?.click()}
          className="flex items-center gap-2.5 px-4 py-2.5 rounded-2xl text-[10px] font-black uppercase text-white transition-all shadow-2xl group"
          style={{background:"rgba(13,13,13,0.92)", border:"1px solid rgba(255,255,255,0.14)", backdropFilter:"blur(16px)"}}
        >
          <span className="text-base group-hover:scale-110 transition-transform">📂</span>
          Cargar JSON
        </button>
      </div>

      <footer className="max-w-7xl mx-auto px-6 mt-16 pt-8 border-t border-white/5 text-center opacity-40">
        <p className="text-[8px] font-black uppercase tracking-[0.4em] text-muted">
          © 2026 BERLÍN<sup className="text-[6px]">°</sup> INFRAESTRUCTURA · ALMENDROS MALL · TRONIO ETAPA 3
        </p>
      </footer>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body></html>
